<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waiter App</title>
  <style>
    body { font-family: Arial; margin:0; background:#f5f5f5; }
    .container { max-width:400px; margin:auto; padding:20px; }
    input, button { width:100%; margin:8px 0; padding:10px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); gap:10px; }
    .table { padding:20px; text-align:center; border-radius:10px; cursor:pointer; color:#000; }
    .open { background:#7ed957; }
    .closed { background:#f3e5ab; }
    .header { padding:10px; font-weight:bold; }
    .menu, .order { background:#fff; padding:10px; margin:10px; border-radius:10px; }
    .hidden { display:none; }
  </style>
</head>
<body>

<div id="loginPage" class="container">
  <h2>Вход</h2>
  <input id="login" placeholder="Логин">
  <input id="password" type="password" placeholder="Пароль">
  <button onclick="login()">Войти</button>
  <p id="error"></p>
</div>

<div id="mainPage" class="hidden">
  <div class="header" onclick="showProfile()" id="username"></div>
  <div id="tables" class="grid"></div>
</div>

<div id="tablePage" class="hidden">
  <button onclick="showMain()">Назад</button>
  <div id="menu" class="menu"></div>
  <div id="order" class="order"></div>
  <button onclick="saveOrder()">Сохранить</button>
  <button onclick="closeTable()">Закрыть стол</button>
</div>

<div id="profilePage" class="hidden container"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby_6Gn2Gifxlm06oQomQPebBJM0rFme13fw0iae4TtUwlAkczayEIdJ2O4Nof2mn8Qe/exec";

let user = null;
let currentTable = null;
let orders = JSON.parse(localStorage.getItem("orders") || "{}");

async function login(){
  const l = document.getElementById("login").value;
  const p = document.getElementById("password").value;

  const res = await fetch(SCRIPT_URL + "?type=users");
  const users = await res.json();

  const found = users.find(u=>u.username===l && u.password===p);

  if(!found){
    document.getElementById("error").innerText = "Неверный логин или пароль";
    return;
  }

  user = found;
  document.getElementById("loginPage").classList.add("hidden");
  showMain();
}

function showMain(){
  hideAll();
  document.getElementById("mainPage").classList.remove("hidden");

  document.getElementById("username").innerText = user.username;

  const container = document.getElementById("tables");
  container.innerHTML="";

  fetch(SCRIPT_URL + "?type=tables")
    .then(res=>res.json())
    .then(tables=>{
      tables.forEach(t=>{
        const id = t.id;
        const name = t.name;

        const div=document.createElement("div");
        div.className="table "+(orders[id]?"open":"closed");
        div.innerText=name;
        div.onclick=()=>openTable(id);
        container.appendChild(div);
      });
    });
}

function openTable(id){
  currentTable=id;
  hideAll();
  document.getElementById("tablePage").classList.remove("hidden");
  loadMenu();
}

async function loadMenu(){
  const res = await fetch(SCRIPT_URL + "?type=menu");
  const data = await res.json();

  const grouped = {};

  data.forEach(row=>{
    if(!grouped[row.category]) grouped[row.category]=[];
    grouped[row.category].push(row.item);
  });

  const menu = document.getElementById("menu");
  menu.innerHTML="";

  Object.keys(grouped).forEach(cat=>{
    const h=document.createElement("h3");
    h.innerText=cat;
    menu.appendChild(h);

    grouped[cat].forEach(item=>{
      const btn=document.createElement("button");
      btn.innerText=item;
      btn.onclick=()=>addItem(item,cat);
      menu.appendChild(btn);
    });
  });

  renderOrder();
}

function addItem(name,cat){
  if(!orders[currentTable]) orders[currentTable]=[];

  let item=orders[currentTable].find(i=>i.name===name);

  if(item) item.qty++;
  else orders[currentTable].push({name,cat,qty:1});

  saveLocal();
  renderOrder();
}

function renderOrder(){
  const div=document.getElementById("order");
  div.innerHTML="";

  (orders[currentTable]||[]).forEach(i=>{
    const el=document.createElement("div");
    el.innerText=`${i.name} x${i.qty}`;

    const plus=document.createElement("button");
    plus.innerText="+";
    plus.onclick=()=>{i.qty++;saveLocal();renderOrder();};

    const minus=document.createElement("button");
    minus.innerText="-";
    minus.onclick=()=>{
      i.qty--;
      if(i.qty<=0) orders[currentTable]=orders[currentTable].filter(x=>x!==i);
      saveLocal();renderOrder();
    };

    el.appendChild(plus);
    el.appendChild(minus);
    div.appendChild(el);
  });
}

function saveLocal(){
  localStorage.setItem("orders", JSON.stringify(orders));
}

function saveOrder(){
  saveLocal();
  showMain();
}

async function closeTable(){
  const data = orders[currentTable]||[];

  const now = new Date();

  await fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({
      table:currentTable,
      user:user.username,
      date: now.toLocaleDateString(),
      time: now.toLocaleTimeString(),
      items:data
    })
  });

  delete orders[currentTable];
  saveLocal();
  showMain();
}

function showProfile(){
  hideAll();
  const div=document.getElementById("profilePage");
  div.classList.remove("hidden");
  div.innerHTML=`
    <p>Логин: ${user.username}</p>
    <p>Роль: ${user.role}</p>
    <button onclick="showMain()">Назад</button>
  `;
}

function hideAll(){
  document.getElementById("mainPage").classList.add("hidden");
  document.getElementById("tablePage").classList.add("hidden");
  document.getElementById("profilePage").classList.add("hidden");
}
</script>

</body>
</html>

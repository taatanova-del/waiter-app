<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Система заказов</title>
<style>
  body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f5f5f5; }
  .hidden { display:none; }
  .container { padding:20px; max-width:900px; margin:auto; }
  h1,h2 { margin:10px 0; }
  input { padding:5px; margin:5px 0; width:100%; box-sizing:border-box; }
  button { padding:5px 10px; margin:5px; cursor:pointer; }
  .table-card { display:inline-block; padding:15px; margin:5px; border-radius:5px; background:#f0e6d2; color:black; font-weight:bold; min-width:80px; text-align:center; cursor:pointer; }
  .table-card.open { background:lightgreen; }
  .header { display:flex; justify-content:space-between; align-items:center; background:#333; color:white; padding:10px; }
  .header span { cursor:pointer; font-weight:bold; }
</style>
</head>
<body>

<!-- Авторизация -->
<div id="loginPage" class="container">
  <h1>Авторизация</h1>
  <input type="text" id="username" placeholder="Логин">
  <input type="password" id="password" placeholder="Пароль">
  <button id="loginBtn">Войти</button>
  <p id="loginError" style="color:red;"></p>
</div>

<!-- Главная страница -->
<div id="mainPage" class="container hidden">
  <div class="header">
    <span id="userProfile"></span>
    <span id="addUserBtn" style="color:yellow;"></span>
  </div>
  <h2>Столы</h2>
  <div id="tablesContainer"></div>
</div>

<!-- Личный кабинет -->
<div id="profilePage" class="container hidden">
  <h1>Личный кабинет</h1>
  <p><b>Имя:</b> <span id="profileName"></span></p>
  <p><b>Роль:</b> <span id="profileRole"></span></p>
  <p><b>Логин:</b> <span id="profileLogin"></span></p>
  <button id="backToMain">Назад</button>
</div>

<!-- Добавление пользователя (только админ) -->
<div id="addUserPage" class="container hidden">
  <h1>Добавить пользователя</h1>
  <input type="text" id="newUserName" placeholder="Имя">
  <input type="text" id="newUserLogin" placeholder="Логин">
  <input type="password" id="newUserPass" placeholder="Пароль">
  <select id="newUserRole">
    <option value="user">Пользователь</option>
    <option value="admin">Админ</option>
  </select>
  <button id="createUserBtn">Создать</button>
  <button id="backFromAddUser">Назад</button>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzKnuVvV3ynr4n6b3r0imUaHS8U91lV7gfQw77B0_47vN-MUSHODk_TcL1p0EK1feSX/exec";

let data = null;
let currentUser = null;

// --- Загрузка данных из Google Sheets ---
async function loadData() {
  try {
    const res = await fetch(SCRIPT_URL);
    data = await res.json();
    console.log("Данные загружены:", data);
  } catch(e){
    console.error("Ошибка загрузки данных:", e);
    document.getElementById('loginError').innerText = "Не удалось загрузить данные";
  }
}

await loadData();

// --- Авторизация ---
document.getElementById('loginBtn').addEventListener('click', ()=>{
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value.trim();

  if(!data || !data.users){ 
      document.getElementById('loginError').innerText="Данные пользователей не загружены"; 
      return; 
  }

  const user = data.users.find(x=>x.username === u);
  if(!user){
      document.getElementById('loginError').innerText = "Пользователь не найден";
      return;
  }

  if(String(user.password) !== p){
      document.getElementById('loginError').innerText = "Неверный пароль";
      return;
  }

  currentUser = user;
  document.getElementById('loginError').innerText = "";
  document.getElementById('loginPage').classList.add('hidden');
  showMainPage();
});

// --- Главная страница ---
function showMainPage(){
  document.getElementById('mainPage').classList.remove('hidden');
  document.getElementById('userProfile').innerText = currentUser.username;
  document.getElementById('userProfile').onclick = ()=>{ showProfile(); };

  const addUserBtn = document.getElementById('addUserBtn');
  if(currentUser.role === 'admin'){
    addUserBtn.innerText = "Добавить пользователя";
    addUserBtn.onclick = ()=>{ showAddUserPage(); };
  } else addUserBtn.innerText = "";

  renderTables();
}

function renderTables(){
  const container = document.getElementById('tablesContainer');
  container.innerHTML = "";
  if(!data.tables) return;
  data.tables.forEach(t=>{
    const div = document.createElement('div');
    div.className = 'table-card';
    div.innerText = t.name;
    div.onclick = ()=>{ alert("Здесь откроется меню для " + t.name); };
    container.appendChild(div);
  });
}

// --- Личный кабинет ---
function showProfile(){
  document.getElementById('mainPage').classList.add('hidden');
  document.getElementById('profilePage').classList.remove('hidden');
  document.getElementById('profileName').innerText = currentUser.username;
  document.getElementById('profileRole').innerText = currentUser.role;
  document.getElementById('profileLogin').innerText = currentUser.username;
}

document.getElementById('backToMain').addEventListener('click', ()=>{
  document.getElementById('profilePage').classList.add('hidden');
  showMainPage();
});

// --- Добавление пользователей ---
function showAddUserPage(){
  document.getElementById('mainPage').classList.add('hidden');
  document.getElementById('addUserPage').classList.remove('hidden');
}

document.getElementById('backFromAddUser').addEventListener('click', ()=>{
  document.getElementById('addUserPage').classList.add('hidden');
  showMainPage();
});

document.getElementById('createUserBtn').addEventListener('click', ()=>{
  const name = document.getElementById('newUserName').value.trim();
  const login = document.getElementById('newUserLogin').value.trim();
  const pass = document.getElementById('newUserPass').value.trim();
  const role = document.getElementById('newUserRole').value;
  if(name && login && pass){
    data.users.push({username:login, password:pass, role:role});
    alert("Пользователь добавлен!");
    document.getElementById('newUserName').value="";
    document.getElementById('newUserLogin').value="";
    document.getElementById('newUserPass').value="";
  }
});
</script>
</body>
</html>

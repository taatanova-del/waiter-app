<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Система заказов для официанта</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  .hidden { display: none; }
  button { padding: 10px 15px; margin: 5px; cursor: pointer; }
  .section { margin-bottom: 20px; }
  #open-tables { margin-top: 20px; }
</style>
</head>
<body>

<h1>Система заказов для официанта</h1>

<!-- Главный экран: выбор столика и панель открытых столов -->
<div id="main-screen" class="section">
  <h2>Выберите столик</h2>
  <button onclick="openTable('Стол 1')">Стол 1</button>
  <button onclick="openTable('Стол 2')">Стол 2</button>
  <button onclick="openTable('Стол 3')">Стол 3</button>

  <div id="open-tables">
    <h3>Открытые столы:</h3>
    <div id="open-tables-buttons"></div>
  </div>
</div>

<!-- Выбор категории -->
<div id="category-selection" class="section hidden">
  <h2>Выберите категорию напитков</h2>
  <button onclick="openCategory('Алкогольные напитки')">Алкогольные напитки</button>
  <button onclick="openCategory('Безалкогольные напитки')">Безалкогольные напитки</button>
  <br><br>
  <button onclick="goBackToMain()">Назад к столам</button>
</div>

<!-- Выбор напитка -->
<div id="drink-selection" class="section hidden">
  <h2 id="category-title"></h2>
  <div id="drink-buttons"></div>
  <br>
  <button onclick="goBackToCategories()">Назад к категориям</button>
</div>

<!-- Выбор количества через кнопки 1-5 -->
<div id="quantity-selection" class="section hidden">
  <h2 id="drink-title"></h2>
  <div id="quantity-buttons"></div>
  <br>
  <button onclick="goBackToDrinks()">Назад к напиткам</button>
</div>

<!-- Просмотр текущего заказа -->
<div id="current-order" class="section hidden">
  <h2>Текущий заказ для <span id="current-table"></span></h2>
  <ul id="order-list"></ul>
  <button onclick="closeTable()">Закрыть столик</button>
  <button onclick="goBackToMain()">Назад к столам</button>
</div>

<script>
let currentTable = '';
let currentCategory = '';
let currentDrink = '';
let orders = {}; // { 'Стол 1': [{drink, quantity}] }

const drinksData = {
  'Алкогольные напитки': ['Вино', 'Пиво', 'Виски'],
  'Безалкогольные напитки': ['Сок', 'Вода', 'Лимонад']
};

// Открыть стол
function openTable(table) {
  currentTable = table;
  if(!orders[currentTable]) orders[currentTable] = [];
  document.getElementById('main-screen').classList.add('hidden');
  document.getElementById('category-selection').classList.remove('hidden');
  updateOpenTables();
  updateOrderView();
}

// Назад к главному экрану
function goBackToMain() {
  currentCategory = '';
  currentDrink = '';
  document.getElementById('category-selection').classList.add('hidden');
  document.getElementById('drink-selection').classList.add('hidden');
  document.getElementById('quantity-selection').classList.add('hidden');
  document.getElementById('current-order').classList.add('hidden');
  document.getElementById('main-screen').classList.remove('hidden');
  updateOpenTables();
}

// Панель открытых столов
function updateOpenTables() {
  const container = document.getElementById('open-tables-buttons');
  container.innerHTML = '';
  for (let table in orders) {
    if (orders[table].length > 0) {
      const btn = document.createElement('button');
      btn.innerText = table;
      btn.onclick = () => viewOrder(table);
      container.appendChild(btn);
    }
  }
}

// Просмотр заказа конкретного столика
function viewOrder(table) {
  currentTable = table;
  document.getElementById('main-screen').classList.add('hidden');
  document.getElementById('current-order').classList.remove('hidden');
  updateOrderView();
}

// Выбор категории
function openCategory(category) {
  currentCategory = category;
  document.getElementById('category-selection').classList.add('hidden');
  document.getElementById('drink-selection').classList.remove('hidden');
  document.getElementById('category-title').innerText = category;

  const drinkButtons = document.getElementById('drink-buttons');
  drinkButtons.innerHTML = '';
  drinksData[category].forEach(drink => {
    const btn = document.createElement('button');
    btn.innerText = drink;
    btn.onclick = () => selectDrink(drink);
    drinkButtons.appendChild(btn);
  });
}

// Назад к категориям
function goBackToCategories() {
  document.getElementById('drink-selection').classList.add('hidden');
  document.getElementById('quantity-selection').classList.add('hidden');
  document.getElementById('category-selection').classList.remove('hidden');
}

// Выбор напитка
function selectDrink(drink) {
  currentDrink = drink;
  document.getElementById('drink-selection').classList.add('hidden');
  document.getElementById('quantity-selection').classList.remove('hidden');
  document.getElementById('drink-title').innerText = drink;

  // Кнопки 1-5
  const container = document.getElementById('quantity-buttons');
  container.innerHTML = '';
  for(let i=1; i<=5; i++){
    const btn = document.createElement('button');
    btn.innerText = i;
    btn.onclick = () => saveDrink(i);
    container.appendChild(btn);
  }
}

// Назад к напиткам
function goBackToDrinks() {
  document.getElementById('quantity-selection').classList.add('hidden');
  document.getElementById('drink-selection').classList.remove('hidden');
}

// Сохраняем напиток с выбранным количеством
function saveDrink(quantity) {
  orders[currentTable].push({drink: currentDrink, quantity});
  document.getElementById('quantity-selection').classList.add('hidden');
  document.getElementById('current-order').classList.remove('hidden');
  updateOrderView();
  updateOpenTables();
}

// Обновление отображения заказа с кнопками удаления
function updateOrderView() {
  document.getElementById('current-table').innerText = currentTable;
  const list = document.getElementById('order-list');
  list.innerHTML = '';

  orders[currentTable].forEach((item, index) => {
    const li = document.createElement('li');
    li.innerText = `${item.drink} — ${item.quantity} `;

    const delBtn = document.createElement('button');
    delBtn.innerText = '❌ Удалить';
    delBtn.style.marginLeft = '10px';
    delBtn.onclick = () => {
      orders[currentTable].splice(index, 1);
      updateOrderView();
      updateOpenTables();
    };

    li.appendChild(delBtn);
    list.appendChild(li);
  });
}

// Закрыть столик
function closeTable() {
  alert(`Заказ для ${currentTable} сохранён!`);
  delete orders[currentTable];
  currentTable = '';
  document.getElementById('current-order').classList.add('hidden');
  document.getElementById('main-screen').classList.remove('hidden');
  updateOpenTables();
}
</script>

</body>
</html>

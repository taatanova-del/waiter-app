<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
</head>
<body onload="initTable()">
    <div class="container">
        <div class="top-section">
            <h2 id="tableNum" style="margin:0 0 10px 0">Стол ...</h2>
            <div id="menuContent"></div>
        </div>
        <div class="bottom-section">
            <h4 style="margin:0 0 10px 0">Заказ:</h4>
            <div id="orderList" style="flex:1; overflow-y:auto;"></div>
            <div style="display:flex; gap:10px;">
                <button class="btn" style="background:#27ae60; color:white;" onclick="saveLocal()">Сохранить</button>
                <button class="btn" style="background:#e74c3c; color:white;" onclick="closeTable()">Закрыть</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

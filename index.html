<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Система заказов</title>
<style>
body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f5f5f5; }
.hidden { display:none; }
.container { padding:20px; max-width:900px; margin:auto; }
h1,h2 { margin:10px 0; }
input { padding:5px; margin:5px 0; width:100%; box-sizing:border-box; }
button { padding:5px 10px; margin:5px; cursor:pointer; }
.table-card { display:inline-block; padding:15px; margin:5px; border-radius:5px; background:#f0e6d2; color:black; font-weight:bold; min-width:80px; text-align:center; cursor:pointer; }
.table-card.open { background:lightgreen; }
.header { display:flex; justify-content:space-between; align-items:center; background:#333; color:white; padding:10px; }
.header span { cursor:pointer; font-weight:bold; }
.menu-section { margin:10px 0; }
.menu-section button { margin:3px; }
.order-item { display:flex; align-items:center; margin:3px 0; }
.order-item span { margin:0 5px; min-width:100px; }
</style>
</head>
<body>

<!-- Авторизация -->
<div id="loginPage" class="container">
  <h1>Авторизация</h1>
  <input type="text" id="username" placeholder="Логин">
  <input type="password" id="password" placeholder="Пароль">
  <button id="loginBtn">Войти</button>
  <p id="loginError" style="color:red;"></p>
</div>

<!-- Главная страница -->
<div id="mainPage" class="container hidden">
  <div class="header">
    <span id="userProfile"></span>
    <span id="addUserBtn" style="color:yellow;"></span>
  </div>
  <h2>Столы</h2>
  <div id="tablesContainer"></div>
</div>

<!-- Личный кабинет -->
<div id="profilePage" class="container hidden">
  <h1>Личный кабинет</h1>
  <p><b>Имя:</b> <span id="profileName"></span></p>
  <p><b>Роль:</b> <span id="profileRole"></span></p>
  <p><b>Логин:</b> <span id="profileLogin"></span></p>
  <button id="backToMain">Назад</button>
</div>

<!-- Добавление пользователя (только админ) -->
<div id="addUserPage" class="container hidden">
  <h1>Добавить пользователя</h1>
  <input type="text" id="newUserName" placeholder="Имя">
  <input type="text" id="newUserLogin" placeholder="Логин">
  <input type="password" id="newUserPass" placeholder="Пароль">
  <select id="newUserRole">
    <option value="user">Пользователь</option>
    <option value="admin">Админ</option>
  </select>
  <button id="createUserBtn">Создать</button>
  <button id="backFromAddUser">Назад</button>
</div>

<!-- Страница стола -->
<div id="tablePage" class="container hidden">
  <div class="header">
    <span id="tableName"></span>
  </div>
  <div style="display:flex;">
    <!-- Блок меню -->
    <div style="flex:1;">
      <h3>Меню</h3>
      <div id="menuSections"></div>
    </div>
    <!-- Блок заказа -->
    <div style="flex:1;">
      <h3>Заказ</h3>
      <div id="orderContainer"></div>
      <button id="saveOrderBtn">Сохранить</button>
      <button id="closeTableBtn">Закрыть стол</button>
      <button id="backToTablesBtn">Назад</button>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzKnuVvV3ynr4n6b3r0imUaHS8U91lV7gfQw77B0_47vN-MUSHODk_TcL1p0EK1feSX/exec";

let data = null;
let currentUser = null;
let currentTable = null;

// --- Загрузка данных ---
async function loadData() {
  try {
    const res = await fetch(SCRIPT_URL);
    const json = await res.json();
    console.log("Данные из Google Script:", json);
    data = json;
  } catch(e){
    console.error(e);
    document.getElementById('loginError').innerText="Не удалось загрузить данные";
  }
}
loadData();

// --- Авторизация ---
document.getElementById('loginBtn').addEventListener('click', ()=>{
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value.trim();

  if(!data || !data.users){
    document.getElementById('loginError').innerText="Данные пользователей не загружены";
    return;
  }

  const user = data.users.find(x=>x.username === u);
  if(!user){ document.getElementById('loginError').innerText="Пользователь не найден"; return; }
  if(String(user.password) !== p){ document.getElementById('loginError').innerText="Неверный пароль"; return; }

  currentUser = user;
  document.getElementById('loginPage').classList.add('hidden');
  showMainPage();
});

// --- Главная страница ---
function showMainPage(){
  document.getElementById('mainPage').classList.remove('hidden');
  document.getElementById('userProfile').innerText = currentUser.username;
  document.getElementById('userProfile').onclick = showProfile;

  const addBtn = document.getElementById('addUserBtn');
  if(currentUser.role === 'admin'){
    addBtn.innerText = "Добавить пользователя";
    addBtn.onclick = showAddUserPage;
  } else addBtn.innerText="";

  renderTables();
}

function renderTables(){
  const container = document.getElementById('tablesContainer');
  container.innerHTML="";
  data.tables.forEach(t=>{
    const div = document.createElement('div');
    div.className='table-card';
    if(Object.keys(t.items).length>0) div.classList.add('open');
    div.innerText=t.name;
    div.onclick = ()=>{ openTable(t.id); };
    container.appendChild(div);
  });
}

// --- Личный кабинет ---
function showProfile(){
  document.getElementById('mainPage').classList.add('hidden');
  document.getElementById('profilePage').classList.remove('hidden');
  document.getElementById('profileName').innerText=currentUser.username;
  document.getElementById('profileRole').innerText=currentUser.role;
  document.getElementById('profileLogin').innerText=currentUser.username;
}
document.getElementById('backToMain').onclick = ()=>{
  document.getElementById('profilePage').classList.add('hidden');
  showMainPage();
}

// --- Добавление пользователя ---
function showAddUserPage(){
  document.getElementById('mainPage').classList.add('hidden');
  document.getElementById('addUserPage').classList.remove('hidden');
}
document.getElementById('backFromAddUser').onclick=()=>{
  document.getElementById('addUserPage').classList.add('hidden');
  showMainPage();
}
document.getElementById('createUserBtn').onclick=()=>{
  const name=document.getElementById('newUserName').value.trim();
  const login=document.getElementById('newUserLogin').value.trim();
  const pass=document.getElementById('newUserPass').value.trim();
  const role=document.getElementById('newUserRole').value;
  if(!name||!login||!pass){alert("Заполните все поля");return;}
  if(data.users.find(u=>u.username===login)){alert("Пользователь существует");return;}
  data.users.push({username:login,password:pass,role:role});
  alert("Пользователь добавлен");
  document.getElementById('newUserName').value="";
  document.getElementById('newUserLogin').value="";
  document.getElementById('newUserPass').value="";
}

// --- Стол и меню ---
function openTable(id){
  currentTable = data.tables.find(t=>t.id===id);
  document.getElementById('mainPage').classList.add('hidden');
  document.getElementById('tablePage').classList.remove('hidden');
  document.getElementById('tableName').innerText=currentTable.name;
  renderMenu();
  renderOrder();
}

// --- Меню ---
function renderMenu(){
  const sections = document.getElementById('menuSections');
  sections.innerHTML="";
  for(const cat in data.menu){
    const div = document.createElement('div');
    div.className="menu-section";
    const btn = document.createElement('button');
    btn.innerText=cat;
    btn.onclick=()=>renderItems(cat);
    div.appendChild(btn);
    sections.appendChild(div);
  }
}
function renderItems(cat){
  const sections = document.getElementById('menuSections');
  sections.innerHTML=`<h4>${cat}</h4>`;
  data.menu[cat].forEach(item=>{
    const btn=document.createElement('button');
    btn.innerText=item;
    btn.onclick=()=>{
      if(!currentTable.items[item]) currentTable.items[item]=1;
      renderOrder();
    }
    sections.appendChild(btn);
  });
}

// --- Заказ ---
function renderOrder(){
  const container = document.getElementById('orderContainer');
  container.innerHTML="";
  for(const item in currentTable.items){
    const div=document.createElement('div');
    div.className='order-item';
    const spanName=document.createElement('span'); spanName.innerText=item;
    const minus=document.createElement('button'); minus.innerText='-';
    minus.onclick=()=>{
      currentTable.items[item]--;
      if(currentTable.items[item]<=0) delete currentTable.items[item];
      renderOrder();
    }
    const qty=document.createElement('span'); qty.innerText=currentTable.items[item];
    const plus=document.createElement('button'); plus.innerText='+';
    plus.onclick=()=>{
      currentTable.items[item]++;
      renderOrder();
    }
    div.appendChild(spanName);
    div.appendChild(minus);
    div.appendChild(qty);
    div.appendChild(plus);
    container.appendChild(div);
  }
}

// --- Кнопки ---
document.getElementById('saveOrderBtn').onclick=()=>{
  document.getElementById('tablePage').classList.add('hidden');
  showMainPage();
}

document.getElementById('backToTablesBtn').onclick=()=>{
  document.getElementById('tablePage').classList.add('hidden');
  showMainPage();
}

document.getElementById('closeTableBtn').onclick=async()=>{
  // отправляем данные на Google Sheets
  const now = new Date();
  const payload=[];
  for(const item in currentTable.items){
    let cat="";
    for(const c in data.menu){
      if(data.menu[c].includes(item)) cat=c;
    }
    payload.push({
      date: now.toLocaleDateString(),
      time: now.toLocaleTimeString(),
      table: currentTable.name,
      category: cat,
      item: item,
      qty: currentTable.items[item]
    });
  }
  try{
    await fetch(SCRIPT_URL,{
      method:'POST',
      body: JSON.stringify(payload),
      headers:{'Content-Type':'application/json'}
    });
    // очищаем стол
    currentTable.items={};
    document.getElementById('tablePage').classList.add('hidden');
    showMainPage();
  }catch(e){console.error(e);}
}
</script>
</body>
</html>

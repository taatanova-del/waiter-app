<div class="container">
    <div class="menu-upper">
        <h2>Личный кабинет</h2>
        <div id="profileData"></div>
        
        <!-- Кнопка обновления для админа -->
        <div id="adminArea" style="display:none">
            <button class="btn btn-refresh" onclick="syncData()">Обновить данные из Таблиц</button>
        </div>

        <button class="btn btn-back" style="margin-top:20px" onclick="location.href='main.html'">Назад</button>
    </div>
</div>
<script src="script.js"></script>
<script>
    const user = JSON.parse(localStorage.getItem('currentUser'));
    document.getElementById('profileData').innerHTML = `
        <p>Имя: ${user.name}</p>
        <p>Роль: ${user.role}</p>
    `;
    if(user.role === 'admin') document.getElementById('adminArea').style.display = 'block';
</script>
